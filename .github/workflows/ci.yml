name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Exercise CLI and empty report
        run: |
          python -m shadowquic_interop implementations
          python -m shadowquic_interop generate --results-dir results --output-dir site
          test -s site/index.html
