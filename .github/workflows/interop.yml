name: Daily interoperability run

on:
  schedule:
    - cron: "30 16 * * *"
  workflow_dispatch:
    inputs:
      target:
        description: Public HTTPS target for HTTP/2 and HTTP/3 probes
        required: false
        default: https://cloudflare.com/

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: shadowquic-interop-pages
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Run interoperability matrix
        env:
          REQUESTED_TARGET: ${{ inputs.target }}
        run: |
          target="${REQUESTED_TARGET:-https://cloudflare.com/}"
          python -m shadowquic_interop run --target "$target"

      - name: Generate report
        run: python -m shadowquic_interop generate

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: shadowquic-interop-${{ github.run_id }}
          path: |
            results/
            work/
          if-no-files-found: warn
          retention-days: 30

      - name: Commit result archive
        run: |
          branch="${GITHUB_REF_NAME:-main}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f results/*.json
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "chore: record interoperability run [skip ci]"
          git fetch origin "$branch"
          if ! git rebase "origin/$branch"; then
            git rebase --abort || true
            echo "Archive branch advanced incompatibly; skipping archive push."
            exit 0
          fi
          if ! git push origin HEAD:"$branch"; then
            echo "Archive branch advanced before push completed; skipping archive push."
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
